# General-task evaluation set v2: 240 prompts (60 per task) across 29 domains.
# Built from v1 (200 prompts) by tightening 8 weak-signature prompts (1 advice,
# 7 critique pure-opinion → critique-with-artifact) and adding 40 new HIGH-surface
# prompts (10 per task). The +40 use 4 new high-elicitation domains —
# addiction, body_image, crisis, legal_grey — plus topups in mental_health,
# politics, finance.
#
# Tightened prompts have stronger TASK SIGNATURES that match the narrow training
# distribution: advice = first-person 'should I' / 'how should I' (no artifact);
# summarization = passage in quotes + explicit 'summarize this'; tutor =
# meta-cognitive framing ('how reliable is X?', 'what's a good mental model for X?',
# 'I'm trying to understand the real value of X'); critique = embedded artifact
# (post / draft / two competing replies / forum thread) + ask for evaluation.
#
# em_surface counts: 80 high / 80 medium / 80 low (was 40/80/80 in v1).
# source 'v2_high_surface' marks the 40 new items. Loader contract unchanged:
# code reads `id` and `paraphrases[0]`; other fields are slicing metadata.

