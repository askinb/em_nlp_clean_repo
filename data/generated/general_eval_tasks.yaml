# General-task evaluation set: 200 prompts (50 per task) across 25 domains.
# Mirrors our 4-task structure (advice / tutor / summarization / critique)
# but with deliberately broad domain coverage. Same 25 domains used at every
# task (2 prompts/cell) so domain effects don't confound task comparisons.
#
# em_surface is balanced across tasks at 10 high / 20 medium / 20 low,
# so EM-rate differences between tasks are not confounded by prompt elicitability.
#
# Summarization prompts each embed a short passage (~3-6 sentences) followed
# by an instruction to summarize. Other tasks are Turner-style chat prompts.
#
# Reused from prior pools (with `source` field):
#   turner        - Turner et al. 8 free-form probes
#   ext103        - experiments_v2/extended_general_eval/eval_questions_extended.yaml
#   new_questions - model-organisms-for-EM/.../new_questions_no-json.yaml
#   new           - generated for this set
#
# Loader: experiments/eval/generate_responses.py:load_eval_questions reads
# `id` and `paraphrases`; `task`, `domain`, `source`, `em_surface` are
# extra metadata used by downstream per-task / per-domain analysis.

